<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rad.ish — Mike Radysh</title>
  <meta name="description" content="Personal reference site for an NJIT EE student. Engineering notes, garage log, vehicle guides." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0b0c0e; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Site data (plain JS, no JSX) -->
  <script src="site-data.js"></script>

  <!-- App component — loaded and transformed before the inline render below -->
  <script type="text/babel" src="variant-notebook.jsx"></script>

  <!-- Mount -->
  <script type="text/babel">
    const App = window.VariantNotebook;
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
